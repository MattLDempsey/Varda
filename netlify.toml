[build]
  command = "npm run build"
  publish = "dist"

# Redirect netlify subdomain to custom domain
[[redirects]]
  from = "https://vardaos.netlify.app/*"
  to = "https://vardaapp.com/:splat"
  status = 301
  force = true

# SPA redirect — all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
